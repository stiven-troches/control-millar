<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard ERP</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Roboto',sans-serif;
  background:#f4f6f8;
  margin:0;
}

header{
  height:56px;
  background:#fff;
  border-bottom:1px solid #d1d5db;
  display:flex;
  align-items:center;
  padding:0 16px;

}

.container{
  padding:16px;
}

.card{
  background:#fff;
  border:1px solid #d1d5db;
  border-radius:4px;
  padding:12px;
  margin-bottom:10px;
}

</style>
</head>

<body>

<header>CONTROL DE PRODUCCIÓN</header>

<div class="container">

<div class="card">Módulo Ingresos</div>
<div class="card">Módulo Alistamiento</div>
<div class="card">Módulo Insumos</div>

</div>

</body>
