<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitar Insumos</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Roboto',sans-serif;
  background:#f4f6f8;
  color:#1f2937;
}

:root{
  --primary:#1e3a8a;
  --border:#d1d5db;
  --bg:#ffffff;
  --text:#111827;
  --muted:#6b7280;
}

/* HEADER */
header{
  height:56px;
  background:#fff;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
}

.hd-title{
  font-size:16px;
  font-weight:700;
}

/* MAIN */
#si-main{
  max-width:600px;
  margin:20px auto;
}

/* CARD */
.form-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:4px;
  padding:16px;
}

.form-title{
  font-size:14px;
  font-weight:700;
  margin-bottom:12px;
  color:var(--primary);
}

/* FORM */
.field{margin-bottom:10px;}

.field label{
  font-size:11px;
  font-weight:600;
  color:var(--muted);
  display:block;
  margin-bottom:4px;
}

.field input,
.field select{
  width:100%;
  padding:6px 8px;
  border:1px solid var(--border);
  border-radius:4px;
  font-size:13px;
  background:#fff;
}

/* BUTTON */
.btn-primary{
  width:100%;
  padding:10px;
  background:var(--primary);
  color:#fff;
  border:none;
  border-radius:4px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
}

/* LIST */
.req-card{
  border:1px solid var(--border);
  border-radius:4px;
  padding:10px;
  margin-bottom:8px;
  background:#fff;
}

.req-fields{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
}

.req-field{
  border:1px solid var(--border);
  padding:4px 6px;
  border-radius:3px;
  font-size:12px;
}

.req-field-lbl{
  font-size:9px;
  color:var(--muted);
}

.req-field-val{
  font-weight:600;
}

/* TIME */
.wait-time{
  font-weight:700;
  color:#b91c1c;
}

</style>
</head>

<body>

<header>
  <div class="hd-title">SOLICITUD DE INSUMOS</div>
</header>

<main id="si-main">

<div class="form-card">
  <div class="form-title">Nueva Solicitud</div>

  <div class="field">
    <label>TIPO</label>
    <input type="text">
  </div>

  <div class="field">
    <label>REFERENCIA</label>
    <input type="text">
  </div>

  <button class="btn-primary">ENVIAR</button>
</div>

<div id="lista"></div>

</main>

<script>
function formatTime(start){
  const now = new Date();
  const diff = (now - new Date(start)) / 60000;
  return diff.toFixed(2);
}

function renderCard(data){
  return `
  <div class="req-card">
    <div class="req-fields">

      <div class="req-field"><div class="req-field-lbl">TIPO</div><div class="req-field-val">${data.tipo||'-'}</div></div>
      <div class="req-field"><div class="req-field-lbl">REFERENCIA</div><div class="req-field-val">${data.ref||'-'}</div></div>
      <div class="req-field"><div class="req-field-lbl">OP/OC</div><div class="req-field-val">${data.op||'-'}</div></div>

      <div class="req-field"><div class="req-field-lbl">INSUMO</div><div class="req-field-val">${data.insumo||'-'}</div></div>
      <div class="req-field"><div class="req-field-lbl">CANTIDAD</div><div class="req-field-val">${data.cantidad||'-'}</div></div>
      <div class="req-field"><div class="req-field-lbl">TALLA</div><div class="req-field-val">${data.talla||'-'}</div></div>

      <div class="req-field"><div class="req-field-lbl">HORA INICIO</div><div class="req-field-val">${data.inicio||'-'}</div></div>
      <div class="req-field"><div class="req-field-lbl">HORA FIN</div><div class="req-field-val">${data.fin||'-'}</div></div>
      <div class="req-field wait-time"><div class="req-field-lbl">T. ESPERA</div><div class="req-field-val" data-start="${data.start}">0.00</div></div>

    </div>
  </div>`;
}

function updateTimes(){
  document.querySelectorAll('[data-start]').forEach(el=>{
    el.innerText = formatTime(el.dataset.start);
  });
}

setInterval(updateTimes, 30000);
</script>

</body>
</html>
