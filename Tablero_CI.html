<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tablero CI — Faltante de Insumos</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
body{ background:#f1f5f9; font-family:'IBM Plex Sans',sans-serif; color:#0f172a; min-height:100vh; overflow-x:hidden; }
input,select,textarea{ font-size:16px !important; }
:root{
  --bg:#f1f5f9; --surface:#ffffff; --surface2:#f8fafc;
  --accent:#2563eb; --accent2:#1e3a8a;
  --text:#0f172a; --muted:#64748b; --border:#e2e8f0;
  --danger:#ef4444; --warn:#f59e0b; --ok:#22c55e;
  --purple:#8b5cf6; --teal:#0d9488;
}

/* ── LOADER ── */
#ci-loader{
  position:fixed;inset:0;z-index:9999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
.ci-spin{
  width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }

/* ── TOPBAR ── */
#ci-topbar{
  position:sticky;top:0;z-index:100;background:#fff;
  border-bottom:1px solid var(--border);
  box-shadow:0 1px 6px rgba(0,0,0,.07);
  padding:0 clamp(12px,2.5vw,24px);
  min-height:60px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
#ci-topbar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#1e3a8a,#2563eb,#7c3aed);
}
.ci-tb-left{ display:flex;align-items:center;gap:10px; }
.ci-tb-title{
  font-family:'Barlow Condensed',sans-serif;font-size:clamp(16px,2.5vw,22px);
  font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#0f172a;line-height:1.1;
}
.ci-tb-title span{ color:var(--accent); }
.ci-tb-right{ display:flex;align-items:center;gap:8px; }
.ci-conn-dot{
  width:9px;height:9px;border-radius:50%;background:#94a3b8;
  transition:background .4s;flex-shrink:0;
}
.ci-conn-dot.ok{ background:var(--ok); box-shadow:0 0 6px rgba(34,197,94,.5); }
.ci-conn-dot.err{ background:var(--danger); }

.ci-btn{
  padding:7px 14px;border-radius:8px;border:1.5px solid var(--border);
  background:#fff;color:var(--accent2);
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:.5px;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:5px;
}
.ci-btn:hover{ background:var(--accent);color:#fff;border-color:var(--accent); }
.ci-btn.danger:hover{ background:var(--danger);color:#fff;border-color:var(--danger); }
.ci-btn.active{ background:var(--accent);color:#fff;border-color:var(--accent); }

/* ── STATS BAR ── */
#ci-stats{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:10px clamp(12px,2.5vw,24px);
  background:#fff;border-bottom:1px solid var(--border);
}
.ci-stat{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:20px;
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;
  cursor:pointer;border:1.5px solid transparent;transition:all .2s;
}
.ci-stat.all{ background:#f1f5f9;color:var(--muted);border-color:var(--border); }
.ci-stat.alert{ background:#fef2f2;color:#b91c1c;border-color:#fca5a5; }
.ci-stat.done{ background:#f0fdf4;color:#15803d;border-color:#86efac; }
.ci-stat.active{ border-width:2px;box-shadow:0 2px 8px rgba(0,0,0,.08); }
.ci-stat .ci-badge{
  background:rgba(0,0,0,.1);border-radius:10px;
  padding:1px 7px;font-size:12px;
}
.ci-stat-spacer{ flex:1; }

/* ── MAIN GRID ── */
#ci-main{
  padding:16px clamp(12px,2.5vw,24px);
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:16px;
  align-items:start;
}

/* ── CARD ── */
.ci-card{
  background:#fff;border-radius:14px;
  border:1.5px solid var(--border);
  box-shadow:0 2px 8px rgba(0,0,0,.06);
  overflow:hidden;
  animation:slup .2s ease;
  transition:box-shadow .2s,transform .2s;
}
.ci-card:hover{ box-shadow:0 6px 20px rgba(0,0,0,.1); transform:translateY(-2px); }
@keyframes slup{ from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;} }

.ci-card.status-alert{ border-top:4px solid var(--danger); }
.ci-card.status-cumplido{ border-top:4px solid var(--warn); }
.ci-card.status-done{ border-top:4px solid var(--ok); opacity:.8; }

/* Cabecera: módulo + badge + timer */
.ci-card-hdr{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px 10px;
  border-bottom:1px solid #f1f5f9;
}
.ci-card-mod{
  font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;
  letter-spacing:3px;color:var(--accent2);
}
.ci-card-badge{
  padding:3px 10px;border-radius:20px;margin-left:auto;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
}
.ci-card-badge.alert{ background:#fef2f2;color:#b91c1c; }
.ci-card-badge.cumplido{ background:#fffbeb;color:#92400e; }
.ci-card-badge.done{ background:#f0fdf4;color:#15803d; }
.ci-card-timer{
  font-family:'Courier New',monospace;font-size:13px;font-weight:700;
  padding:3px 8px;border-radius:6px;letter-spacing:1px;
  background:#f1f5f9;color:var(--muted);white-space:nowrap;
}
.ci-card-timer.warn{ background:#fef3c7;color:#92400e; }
.ci-card-timer.danger{ background:#fef2f2;color:#b91c1c;animation:blink 1s ease-in-out infinite; }
@keyframes blink{ 0%,100%{opacity:1;}50%{opacity:.5;} }

/* Tabla de ficha estilo Excel */
.ci-card-table{
  width:100%;border-collapse:collapse;
  font-family:'IBM Plex Sans',sans-serif;font-size:13px;
}
.ci-card-table tr{ border-bottom:1px solid #f1f5f9; }
.ci-card-table tr:last-child{ border-bottom:none; }
.ci-card-table td{ padding:7px 16px; }
.ci-card-table td:first-child{
  font-size:10px;font-weight:800;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--muted);
  width:42%;background:#fafbfc;
}
.ci-card-table td:last-child{
  font-family:'Barlow Condensed',sans-serif;font-size:16px;
  font-weight:700;color:var(--text);letter-spacing:.5px;
}

/* Footer acciones */
.ci-card-footer{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px 12px;flex-wrap:wrap;
  border-top:1px solid #f1f5f9;
}
.ci-card-obs{ font-size:11px;color:var(--muted);font-style:italic;flex:1; }
.ci-action-btn{
  padding:7px 14px;border-radius:8px;border:none;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:.5px;transition:all .2s;
}
.ci-action-btn.cumplir{ background:linear-gradient(135deg,#15803d,#22c55e);color:#fff; }
.ci-action-btn.cumplir:hover{ filter:brightness(1.1); }
.ci-action-btn.obs{ background:#f1f5f9;color:var(--muted);border:1.5px solid var(--border); }
.ci-action-btn.obs:hover{ background:var(--muted);color:#fff; }
.ci-action-btn.del{ background:#fef2f2;color:#b91c1c;border:1.5px solid #fca5a5;padding:7px 10px; }
.ci-action-btn.del:hover{ background:var(--danger);color:#fff;border-color:var(--danger); }

/* ── EMPTY STATE ── */
.ci-empty{
  text-align:center;padding:60px 20px;color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-size:18px;letter-spacing:2px;
}
.ci-empty-icon{ font-size:48px;margin-bottom:12px; }

/* ── MODAL BASE ── */
.ci-modal-overlay{
  position:fixed;inset:0;z-index:800;background:rgba(15,23,42,.55);
  backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:16px;
}
.ci-modal-overlay.open{ display:flex; }
.ci-modal-box{
  background:#fff;border-radius:18px;padding:28px 24px 22px;
  width:100%;max-width:420px;box-shadow:0 24px 60px rgba(15,23,42,.25);
  animation:slup .2s ease;
}
.ci-modal-title{
  font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;
  letter-spacing:2px;text-transform:uppercase;color:var(--accent2);margin-bottom:4px;
}
.ci-modal-sub{ font-size:12px;color:var(--muted);margin-bottom:20px; }
.ci-modal-label{
  font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px;display:block;
}
.ci-modal-input{
  width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-family:'IBM Plex Sans',sans-serif;font-size:14px;color:var(--text);
  background:#f8fafc;outline:none;margin-bottom:14px;
}
.ci-modal-input:focus{ border-color:var(--accent); }
.ci-modal-btns{ display:flex;gap:10px;margin-top:8px; }
.ci-modal-btn{
  flex:1;padding:12px;border-radius:10px;border:none;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
  letter-spacing:1px;transition:all .2s;
}
.ci-modal-btn.primary{ background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff; }
.ci-modal-btn.primary:hover{ filter:brightness(1.1); }
.ci-modal-btn.secondary{ background:#f1f5f9;color:var(--muted);border:1.5px solid var(--border); }
.ci-modal-btn.secondary:hover{ background:var(--muted);color:#fff; }

/* ── CONFIG SCREEN ── */
#ci-config-screen{
  display:none;position:fixed;inset:0;z-index:700;
  background:var(--bg);overflow-y:auto;
}
.cfg-topbar{
  position:sticky;top:0;z-index:10;background:#fff;
  border-bottom:1px solid var(--border);padding:0 clamp(12px,2.5vw,24px);
  min-height:56px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 1px 6px rgba(0,0,0,.06);
}
.cfg-title{
  font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;
  letter-spacing:2px;text-transform:uppercase;color:var(--accent2);
}
.cfg-body{ padding:20px clamp(12px,2.5vw,24px);display:flex;flex-direction:column;gap:20px; }
.cfg-section{
  background:#fff;border-radius:14px;border:1.5px solid var(--border);
  padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.03);
}
.cfg-sec-title{
  font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--accent2);margin-bottom:14px;
}
.cfg-chips{ display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px; }
.cfg-chip{
  display:flex;align-items:center;gap:6px;
  padding:5px 10px 5px 12px;border-radius:20px;
  background:#f1f5f9;border:1.5px solid var(--border);
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;
}
.cfg-chip-del{
  background:none;border:none;cursor:pointer;color:var(--muted);
  font-size:14px;line-height:1;padding:0 2px;transition:color .2s;
}
.cfg-chip-del:hover{ color:var(--danger); }
.cfg-add-row{ display:flex;gap:8px; }
.cfg-add-input{
  flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;
  font-family:'IBM Plex Sans',sans-serif;font-size:14px;color:var(--text);
  background:#f8fafc;outline:none;
}
.cfg-add-input:focus{ border-color:var(--accent); }
.cfg-add-btn{
  padding:8px 16px;border-radius:8px;border:none;cursor:pointer;
  background:var(--accent);color:#fff;
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px;
  transition:filter .2s;
}
.cfg-add-btn:hover{ filter:brightness(1.1); }
.cfg-flow-row{ display:flex;align-items:center;gap:8px;margin-bottom:8px; }
.cfg-flow-sel{
  padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;
  font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:var(--text);
  background:#f8fafc;outline:none;
}

/* ── TOAST ── */
#ci-toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#0f172a;color:#fff;padding:12px 24px;border-radius:12px;
  font-family:'IBM Plex Sans',sans-serif;font-size:14px;font-weight:700;
  z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.2);
  animation:slup .2s ease;display:none;
}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .ci-card-field{ min-width:calc(50% - 4px); }
  .ci-tb-right .ci-btn span{ display:none; }
}

/* ── Header estilo Tablero Planta ── */
.hd-logo{
  width:36px;height:36px;border-radius:50%;background:#fff;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  box-shadow:0 0 0 2px #e2e8f0,0 2px 8px rgba(0,0,0,.08);flex-shrink:0;
}
.hd-logo img{ width:100%;height:100%;object-fit:contain;padding:3px; }
.hd-user-badge{
  display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:8px;
  background:#fff;border:1.5px solid var(--border);
  font-family:'Barlow Condensed',sans-serif;font-size:clamp(11px,1.3vw,14px);
  font-weight:700;color:#475569;letter-spacing:1.5px;text-transform:uppercase;
}
.hd-back-btn{
  padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);
  background:#fff;color:var(--accent2);font-family:'IBM Plex Sans',sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.hd-back-btn:hover{ background:#f1f5f9;border-color:#93c5fd; }
</style>
</head>

  <!-- STATS BAR -->
  <div id="ci-stats">
    <div class="ci-stat all active" id="sf-all" onclick="setFilter('all')">
      Todos <span class="ci-badge" id="cnt-all">0</span>
    </div>
    <div class="ci-stat alert" id="sf-alert" onclick="setFilter('alert')">
      🔴 Pendientes <span class="ci-badge" id="cnt-alert">0</span>
    </div>
    <div class="ci-stat done" id="sf-done" onclick="setFilter('done')">
      ✅ Entregados <span class="ci-badge" id="cnt-done">0</span>
    </div>
    <div class="ci-stat-spacer"></div>
    <div style="position:relative;" id="fecha-wrap">
      <button class="hd-back-btn" onclick="toggleFechaPanel()" id="btn-fecha" style="display:flex;align-items:center;gap:6px;">
        📅 <span id="btn-fecha-lbl">Fecha</span>
      </button>
      <div id="fecha-panel" style="display:none;position:absolute;top:110%;right:0;z-index:300;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:240px;">
        <div style="font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Desde</div>
        <input type="date" id="ci-fecha-desde" style="width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;margin-bottom:10px;outline:none;">
        <div style="font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Hasta</div>
        <input type="date" id="ci-fecha-hasta" style="width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;margin-bottom:14px;outline:none;">
        <div style="display:flex;gap:8px;">
          <button onclick="aplicarFecha()" style="flex:1;padding:8px;border-radius:8px;border:none;background:#2563eb;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px;cursor:pointer;">Filtrar</button>
          <button onclick="limpiarFecha()" style="flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;cursor:pointer;">Limpiar</button>
        </div>
      </div>
    </div>

    <button class="hd-back-btn" onclick="abrirConfig()" title="Configuración" style="padding:6px 10px;">⚙️</button>

      <div class="cfg-chips" id="cfg-obs-chips"></div>
      <div class="cfg-add-row">
        <input class="cfg-add-input" id="cfg-obs-input" type="text" placeholder="Nueva observación">
        <button class="cfg-add-btn" onclick="cfgAddObs()">+ Agregar</button>
      </div>
    </div>

    <!-- Sonido de alerta -->
    <div class="cfg-section">
      <div class="cfg-sec-title">🔔 Sonido de Alerta</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">Selecciona el sonido que suena al llegar una nueva solicitud.</p>
      <div id="cfg-sound-options" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>

    <button class="ci-modal-btn primary" style="width:100%;padding:14px;" onclick="cfgGuardar()">
      💾 Guardar configuración
    </button>

  </div>
</div>



<!-- TOAST -->
<div id="ci-toast"></div>

<script>
// ══════════════════════════════════════════════════════
//  Tablero_CI.html — Faltante de Insumos
//  Se comunica con server.js vía WebSocket
// ══════════════════════════════════════════════════════

function dbg(msg){
  console.log('[CI]', msg);
  const el = document.getElementById('ci-debug');
  if(el) el.innerHTML += '• ' + msg + '<br>';
}

// ── Parámetros URL ──
const _params    = new URLSearchParams(window.location.search);
const currentUser = _params.get('perfil') || _params.get('user') || 'CI';
const esModoMec   = _params.get('mec') === '1';  // Mecánico solicitando

// ── Estado global ──
let ciRequests   = [];
let ciConfig     = { tipoInsumoList:[], elasticoList:[], moduleList:[], obsList:[] };
let wsReady      = false;
let reconnectDelay = 1000;
let reconnectTimer = null;
let _filterStatus  = 'all';
let _filterMod = '';
let _timerInterval = null;
let _pendingDelId  = null;

// ── WebSocket ──
let ws;

function wsSend(obj){
  if(ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
}

function connectWS(){
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const url   = `${proto}://${location.host}`;
  dbg('Conectando WS → ' + url);
  ws = new WebSocket(url);

  ws.onopen = () => {
    wsReady = true;
    reconnectDelay = 1000;
    clearTimeout(reconnectTimer);
    setDot(true);
    dbg('WS conectado ✓');
    // El servidor manda 'init' automáticamente al conectar
    // pero también pedimos ci_init por si acaso
    setTimeout(() => wsSend({ type: 'ci_init' }), 100);
  };

  ws.onmessage = (e) => {
    try{
      const msg = JSON.parse(e.data);
      dbg('msg: ' + msg.type);

      // El servidor manda 'init' al conectar — aprovechar para pedir ci_init
      if(msg.type === 'init'){
        dbg('init del servidor recibido — pidiendo ci_init');
        wsSend({ type: 'ci_init' });
        return;
      }

      if(msg.type === 'ci_init'){
        ciRequests = msg.requests || [];
        if(msg.tipoInsumoList) ciConfig.tipoInsumoList = msg.tipoInsumoList;
        if(msg.elasticoList)   ciConfig.elasticoList   = msg.elasticoList;
        if(msg.moduleList)     ciConfig.moduleList     = msg.moduleList;
        if(msg.obsList)        ciConfig.obsList        = msg.obsList;
        arrancar();

      } else if(msg.type === 'ci_new_request'){
        if(!ciRequests.find(r => r._id === msg.request._id)){
          ciRequests.unshift(msg.request);
        }
        renderCards();
        playAlertSound();
        showToast('📦 Nueva solicitud de ' + (msg.request.module || ''));

      } else if(msg.type === 'ci_update_request'){
        const idx = ciRequests.findIndex(r => r._id === msg.request._id);
        if(idx > -1) ciRequests[idx] = msg.request;
        else ciRequests.unshift(msg.request);
        renderCards();

      } else if(msg.type === 'ci_delete_request'){
        if(msg.reqId) ciRequests = ciRequests.filter(r => r._id !== msg.reqId);
        else if(typeof msg.idx === 'number') ciRequests.splice(msg.idx, 1);
        renderCards();

      } else if(msg.type === 'ci_config_sync'){
        if(msg.tipoInsumoList) ciConfig.tipoInsumoList = msg.tipoInsumoList;
        if(msg.elasticoList)   ciConfig.elasticoList   = msg.elasticoList;
        if(msg.moduleList)     ciConfig.moduleList     = msg.moduleList;
        if(msg.obsList)        ciConfig.obsList        = msg.obsList;
            }

    } catch(err){ dbg('Error parseando: ' + err.message); }
  };

  ws.onclose = () => {
    wsReady = false;
    setDot(false);
    dbg('WS cerrado — reconectando en ' + reconnectDelay + 'ms');
    reconnectTimer = setTimeout(() => {
      reconnectDelay = Math.min(reconnectDelay * 1.5, 15000);
      connectWS();
    }, reconnectDelay);
  };

  ws.onerror = (e) => { dbg('WS error'); };
}

function setDot(ok){
  const d = document.getElementById('ci-conn-dot');
  if(!d) return;
  d.className = 'ci-conn-dot' + (ok ? ' ok' : ' err');
}

// ── Exportar Excel .xlsx con SheetJS ──
function exportarExcel(){
  const desde = document.getElementById('ci-fecha-desde').value;
  const hasta  = document.getElementById('ci-fecha-hasta').value;
  let data = ciRequests.slice();
  data = filtrarPorFecha(data);
  const statusLabel = s => s==='done'?'Entregado':s==='cumplido'?'Listo':s==='alert'?'Pendiente':s||'';

  if(typeof XLSX !== 'undefined'){
    // SheetJS disponible — generar .xlsx real
    const rows = data.map(r => ({
      'Módulo':         r.module||'',
      'Tipo':           r.categoria||'Falta de Insumo',
      'Referencia':     r.ref||'',
      'OP / OC':        r.op||'',
      'Insumo':         (r.tipo||'').replace(/\s*·\s*.+$/,''),
      'Cantidad':       r.qty||'',
      'Talla':          r.talla||'',
      'Fecha':          r.fecha||'',
      'Hora Inicio':    r.hora||'',
      'Hora Fin':       r.resolvedAt||'',
      'T. Espera (min)':r.waitTime!=null ? Math.round(r.waitTime/60) : '',
      'Estado':         statusLabel(r.status),
      'Obs.':           r.obs||''
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [{wch:10},{wch:22},{wch:14},{wch:14},{wch:20},
                   {wch:10},{wch:8},{wch:14},{wch:14},{wch:14},{wch:14},{wch:12},{wch:20}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'CI');
    const label = desde===hasta ? (desde||fechaLocal()) : (desde||'')+'_'+(hasta||'');
    const fname = 'CI_'+label.replace(/\//g,'-')+'.xlsx';
    XLSX.writeFile(wb, fname);
    showToast('📥 Descargado: '+fname);
  } else {
    // Fallback: CSV con BOM para que Excel lo abra bien
    const headers = ['Módulo','Tipo','Referencia','OP/OC','Insumo','Cantidad','Talla','Fecha','Hora Inicio','Hora Fin','T.Espera(min)','Estado','Obs.'];
    const rows = data.map(r => [
      r.module||'', r.categoria||'Falta de Insumo', r.ref||'', r.op||'',
      (r.tipo||'').replace(/\s*·\s*.+$/,''), r.qty||'', r.talla||'',
      r.fecha||'', r.hora||'', r.resolvedAt||'',
      r.waitTime!=null?Math.round(r.waitTime/60):'', statusLabel(r.status), r.obs||''
    ]);
    const csv = [headers,...rows].map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
    const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const label = desde===hasta?(desde||fechaLocal()):(desde||'')+'_'+(hasta||'');
    a.href=url; a.download='CI_'+label.replace(/\//g,'-')+'.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('📥 Descargado (CSV)');
  }
}

// ── Fecha helpers ──
function fechaLocal(date){
  // Formato YYYY-MM-DD en hora local
  const d = date || new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function parseFechaReq(req){
  // Intenta extraer fecha de req.fecha (dd/mm/yyyy) o req.alertStart
  if(req.alertStart) return fechaLocal(new Date(req.alertStart));
  if(req.fecha){
    // formato es-CO: d/m/yyyy
    const parts = req.fecha.split('/');
    if(parts.length===3){
      const [d,m,y] = parts;
      return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
    }
  }
  return null;
}

function initFechas(){
  const hoy = fechaLocal();
  // Siempre inicializar con el día actual si no hay valor
  const desde = document.getElementById('ci-fecha-desde');
  const hasta  = document.getElementById('ci-fecha-hasta');
  if(!desde.value) desde.value = hoy;
  if(!hasta.value)  hasta.value  = hoy;
  actualizarBtnFechaLbl();
}

function toggleFechaPanel(){
  const panel = document.getElementById('fecha-panel');
  panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
}

function aplicarFecha(){
  document.getElementById('fecha-panel').style.display = 'none';
  actualizarBtnFechaLbl();
  renderCards();
}

function limpiarFecha(){
  const hoy = fechaLocal();
  document.getElementById('ci-fecha-desde').value = hoy;
  document.getElementById('ci-fecha-hasta').value = hoy;
  document.getElementById('fecha-panel').style.display = 'none';
  actualizarBtnFechaLbl();
  renderCards();
}

function actualizarBtnFechaLbl(){
  const desde = document.getElementById('ci-fecha-desde').value;
  const hasta = document.getElementById('ci-fecha-hasta').value;
  const lbl   = document.getElementById('btn-fecha-lbl');
  if(!desde && !hasta){ lbl.textContent = 'Fecha'; return; }
  if(desde === hasta) lbl.textContent = desde;
  else lbl.textContent = (desde||'…') + ' → ' + (hasta||'…');
}

function filtrarPorFecha(list){
  const hoy   = fechaLocal();
  const desde = document.getElementById('ci-fecha-desde').value || hoy;
  const hasta = document.getElementById('ci-fecha-hasta').value || hoy;
  if(!desde && !hasta) return list;
  return list.filter(r => {
    const f = parseFechaReq(r);
    if(!f) return true;
    if(desde && f < desde) return false;
    if(hasta && f > hasta) return false;
    return true;
  });
}


// ── Arrancar ──
function arrancar(){
  dbg('Arrancando — ' + ciRequests.length + ' solicitudes');
  document.getElementById('ci-loader').style.display = 'none';
  document.getElementById('ci-app').style.display    = 'block';
  initFechas();
  renderCards();
  startTimers();
}


// ── Formato tiempo ──
function fmtElapsed(ms){
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if(h > 0) return `${h}h ${m % 60}m`;
  if(m > 0) return `${m}m ${s % 60}s`;
  return `${s}s`;
}

function timerClass(ms){
  const min = ms / 60000;
  if(min >= 15) return 'danger';
  if(min >= 7)  return 'warn';
  return '';
}

// ── Render principal ──
function renderCards(){
  _filterMod = '';
  const main = document.getElementById('ci-main');
  main.innerHTML = '';

  let visible = ciRequests.slice();
  visible = filtrarPorFecha(visible);
  if(_filterMod) visible = visible.filter(r => r.module === _filterMod);

  const pending = visible.filter(r => r.status === 'alert' || r.status === 'cumplido');
  const done    = visible.filter(r => r.status === 'done');

  // Stats
  document.getElementById('cnt-all').textContent   = visible.length;
  document.getElementById('cnt-alert').textContent  = pending.length;
  document.getElementById('cnt-done').textContent   = done.length;

  // Filter highlight
  ['all','alert','done'].forEach(f => {
    document.getElementById('sf-'+f).classList.toggle('active', _filterStatus === f);
  });

  let toShow = [];
  if(_filterStatus === 'all')   toShow = visible;
  else if(_filterStatus === 'alert') toShow = pending;
  else if(_filterStatus === 'done')  toShow = done;

  if(toShow.length === 0){
    main.innerHTML = `<div class="ci-empty"><div class="ci-empty-icon">📦</div>No hay solicitudes${_filterStatus !== 'all' ? ' en este filtro' : ''}</div>`;
    return;
  }

  // Pending primero, luego done
  const sorted = [
    ...toShow.filter(r => r.status === 'alert' || r.status === 'cumplido'),
    ...toShow.filter(r => r.status === 'done')
  ];

  sorted.forEach(req => {
    const card = buildCard(req);
    main.appendChild(card);
  });
}

// ── Formato hora sin segundos ──
function fmtHora(str){
  if(!str) return '—';
  // Si ya es un string de hora (ej: "1:19:51 p. m."), quitar los segundos
  // Patrones: "H:MM:SS a. m." / "HH:MM:SS p. m." (es-CO) o "HH:MM:SS"
  const mES = str.match(/^(\d{1,2}:\d{2}):\d{2}(\s*[ap]\.\s*m\.)?$/i);
  if(mES) return mES[1] + (mES[2] ? mES[2].replace(/\s+/g,' ').trim() : '');
  // Si viene de alertStart (timestamp), formatearlo
  return str;
}

function fmtHoraFromMs(ts){
  if(!ts) return '—';
  return new Date(ts).toLocaleTimeString('es-CO',{hour:'numeric',minute:'2-digit',hour12:true});
}

// ── T. Espera en decimal de minutos ──
function calcTEsperaDecimal(ms){
  // ms → minutos decimales, 2 decimales
  const min = ms / 60000;
  return min.toFixed(2);
}

function buildCard(req){
  const isDone = req.status === 'done';
  const isCump = req.status === 'cumplido';

  const div = document.createElement('div');
  div.className = `ci-card status-${req.status || 'alert'}`;
  div.dataset.id        = req._id;
  div.dataset.alertStart = req.alertStart || '';
  div.dataset.isDone    = isDone ? '1' : '0';

  const badgeLabel = isDone ? 'Entregado ✅' : isCump ? 'Listo ✓' : 'Pendiente 🔴';

  // Hora inicio: primero intentar alertStart (más preciso), luego req.hora
  const horaInicio = req.alertStart
    ? fmtHoraFromMs(req.alertStart)
    : fmtHora(req.hora);

  // Hora fin: sin segundos
  const horaFin = req.resolvedAt ? fmtHora(req.resolvedAt) : '—';

  // T. Espera: para done usar waitTime guardado; para activas, se actualiza en vivo
  const tEsperaInicial = isDone
    ? (req.waitTime != null ? calcTEsperaDecimal(req.waitTime) : '—')
    : (req.alertStart ? calcTEsperaDecimal(Date.now() - req.alertStart) : '—');

  // Insumo: quitar " · talla"
  const insumo    = (req.tipo || '—').replace(/\s*·\s*.+$/, '');
  const categoria = req.categoria || 'Falta de Insumo';
  const talla     = req.talla || '—';

  div.innerHTML = `
    <div class="ci-card-hdr">
      <div class="ci-card-mod">${req.module || '—'}</div>
      <span class="ci-card-badge ${req.status || 'alert'}">${badgeLabel}</span>
    </div>
    <table class="ci-card-table">
      <tr><td>Tipo</td><td>${categoria}</td></tr>
      <tr><td>Referencia</td><td>${req.ref || '—'}</td></tr>
      <tr><td>OP / OC</td><td>${req.op || '—'}</td></tr>
      <tr><td>Insumo</td><td>${insumo}</td></tr>
      <tr><td>Cantidad</td><td>${req.qty || '—'}</td></tr>
      <tr><td>Talla</td><td>${talla}</td></tr>
      <tr><td>Hora Inicio</td><td>${horaInicio}</td></tr>
      <tr><td>Hora Fin</td><td>${horaFin}</td></tr>
      <tr><td>T. Espera</td><td class="ci-tespera-val">${tEsperaInicial}</td></tr>
      ${req.obs ? `<tr><td>Obs.</td><td style="font-style:italic;color:var(--muted);">${req.obs}</td></tr>` : ''}
    </table>
    <div class="ci-card-footer">
      ${!isDone ? `
        <div style="position:relative;display:inline-block;" id="obs-wrap-${req._id}">
          <button class="ci-action-btn obs" onclick="toggleObsMenu('${req._id}')">📝 Obs.</button>
          <div id="obs-menu-${req._id}" style="display:none;position:absolute;bottom:110%;left:0;z-index:200;background:#fff;border:1.5px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:180px;padding:6px 0;"></div>
        </div>
        <button class="ci-action-btn cumplir" onclick="marcarCumplido('${req._id}')"
          ${!req.obs ? 'disabled title="Agrega una observación antes de marcar cumplido" style="opacity:0.45;cursor:not-allowed;"' : ''}>✅ Cumplido</button>
        <button class="ci-action-btn del" onclick="abrirDel('${req._id}')">🗑</button>
      ` : `
        <button class="ci-action-btn del" onclick="abrirDel('${req._id}')">🗑 Eliminar</button>
      `}
    </div>
  `;
  return div;
}

// ── Timer en vivo — actualiza T. Espera en decimal de minutos cada 5s ──
function startTimers(){
  if(_timerInterval) clearInterval(_timerInterval);
  _timerInterval = setInterval(() => {
    const now = Date.now();
    document.querySelectorAll('.ci-card').forEach(card => {
      if(card.dataset.isDone === '1') return; // done no cambia
      const alertStart = parseInt(card.dataset.alertStart);
      if(!alertStart) return;
      const el = card.querySelector('.ci-tespera-val');
      if(!el) return;
      el.textContent = calcTEsperaDecimal(now - alertStart);
    });
  }, 5000); // cada 5 segundos — liviano y preciso
}



// ── Filtros ──
function setFilter(f){
  _filterStatus = f;
  renderCards();
}

// ── Marcar cumplido ──
function marcarCumplido(id){
  const req = ciRequests.find(r => r._id === id);
  if(!req) return;
  const updated = Object.assign({}, req, {
    status:     'cumplido',
    resolvedAt: new Date().toLocaleTimeString('es-CO'),
    waitTime:   req.alertStart ? Date.now() - req.alertStart : 0
  });
  // Actualizar localmente
  const idx = ciRequests.findIndex(r => r._id === id);
  if(idx > -1) ciRequests[idx] = updated;
  // Broadcast a módulos (ellos ven modal de confirmación)
  wsSend({ type: 'ci_cumplido_request', request: updated });
  // También actualizar en servidor
  wsSend({ type: 'ci_update_request',   request: updated });
  renderCards();
  showToast('📦 Insumo marcado como cumplido para ' + (req.module || ''));
}

// ── Dropdown Observación ──
let _obsMenuOpen = null;

function toggleObsMenu(id){
  // Cerrar cualquier menú abierto
  if(_obsMenuOpen && _obsMenuOpen !== id){
    const prev = document.getElementById('obs-menu-'+_obsMenuOpen);
    if(prev) prev.style.display = 'none';
  }
  const menu = document.getElementById('obs-menu-'+id);
  if(!menu) return;
  const isOpen = menu.style.display === 'block';
  menu.style.display = isOpen ? 'none' : 'block';
  _obsMenuOpen = isOpen ? null : id;
  if(!isOpen) buildObsMenu(id, menu);
}

function buildObsMenu(id, menu){
  const req = ciRequests.find(r => r._id === id);
  menu.innerHTML = '';
  // Opciones predefinidas de ciConfig.obsList
  const opts = ciConfig.obsList && ciConfig.obsList.length ? ciConfig.obsList : ['Pérdida','Faltante','Defectos'];
  opts.forEach(obs => {
    const item = document.createElement('div');
    item.style.cssText = 'padding:9px 16px;cursor:pointer;font-family:"IBM Plex Sans",sans-serif;font-size:13px;color:#0f172a;transition:background .15s;';
    item.textContent = obs;
    if(req && req.obs === obs) item.style.fontWeight = '700';
    item.onmouseenter = () => item.style.background = '#f1f5f9';
    item.onmouseleave = () => item.style.background = '';
    item.onclick = () => guardarObsDirecta(id, obs);
    menu.appendChild(item);
  });
  // Separador + Limpiar obs
  if(req && req.obs){
    const sep = document.createElement('div');
    sep.style.cssText = 'height:1px;background:#e2e8f0;margin:4px 0;';
    menu.appendChild(sep);
    const clear = document.createElement('div');
    clear.style.cssText = 'padding:9px 16px;cursor:pointer;font-family:"IBM Plex Sans",sans-serif;font-size:13px;color:#94a3b8;transition:background .15s;';
    clear.textContent = '✕ Quitar observación';
    clear.onmouseenter = () => clear.style.background = '#f1f5f9';
    clear.onmouseleave = () => clear.style.background = '';
    clear.onclick = () => guardarObsDirecta(id, '');
    menu.appendChild(clear);
  }
}

function guardarObsDirecta(id, obs){
  const menu = document.getElementById('obs-menu-'+id);
  if(menu) menu.style.display = 'none';
  _obsMenuOpen = null;
  const req = ciRequests.find(r => r._id === id);
  if(!req) return;
  const updated = Object.assign({}, req, { obs });
  const idx = ciRequests.findIndex(r => r._id === id);
  if(idx > -1) ciRequests[idx] = updated;
  wsSend({ type: 'ci_update_request', request: updated });
  renderCards();
  showToast(obs ? '📝 Observación guardada' : '📝 Observación eliminada');
}

// Cerrar menú al hacer click afuera
document.addEventListener('click', e => {
  // Cerrar panel de fecha al click afuera
  if(!e.target.closest('#fecha-wrap')){
    const fp = document.getElementById('fecha-panel');
    if(fp) fp.style.display = 'none';
  }
  if(_obsMenuOpen && !e.target.closest('[id^="obs-wrap-"]')){
    const menu = document.getElementById('obs-menu-'+_obsMenuOpen);
    if(menu) menu.style.display = 'none';
    _obsMenuOpen = null;
  }
});

// ── Modal Eliminar con contraseña admin ──
function abrirDel(id){
  _pendingDelId = id;
  const req = ciRequests.find(r => r._id === id);
  const sub = document.getElementById('modal-del-sub');
  if(sub) sub.textContent = req
    ? `Solicitud de ${req.tipo} — módulo ${req.module}`
    : 'Solicitud seleccionada';
  const passEl = document.getElementById('modal-del-pass');
  if(passEl){ passEl.value=''; }
  const errEl = document.getElementById('modal-del-err');
  if(errEl){ errEl.style.display='none'; }
  document.getElementById('modal-del').classList.add('open');
  setTimeout(()=>{ if(passEl) passEl.focus(); }, 100);
}
function cerrarModalDel(){
  document.getElementById('modal-del').classList.remove('open');
  _pendingDelId = null;
}
function confirmarDel(){
  if(!_pendingDelId) return;
  const pass   = (document.getElementById('modal-del-pass')?.value || '').trim();
  const errEl  = document.getElementById('modal-del-err');
  // Verificar contraseña contra los usuarios con permiso admin/fix
  const ADMIN_PASS = Object.values(window._adminPasswords||{});
  if(!pass){ if(errEl){errEl.textContent='Ingresa la contraseña de administrador';errEl.style.display='block';} return; }
  // Llamar al servidor para verificar
  fetch('/api/app-config')
    .then(r=>r.json())
    .then(cfg=>{
      // Buscar en usuarios extra o builtin con permiso 'fix'
      const usuarios = cfg._usuarios_extra || [];
      const valid = usuarios.some(u => u.pass === pass && (u.perms||[]).includes('fix'))
                 || pass === '1'; // Programador builtin
      if(!valid){
        if(errEl){errEl.textContent='Contraseña incorrecta';errEl.style.display='block';}
        return;
      }
      const id  = _pendingDelId;
      const idx = ciRequests.findIndex(r => r._id === id);
      if(idx > -1) ciRequests.splice(idx, 1);
      wsSend({ type: 'ci_delete_request', reqId: id });
      cerrarModalDel();
      renderCards();
          showToast('🗑 Solicitud eliminada');
    })
    .catch(()=>{
      if(errEl){errEl.textContent='Error al verificar. Intenta de nuevo.';errEl.style.display='block';}
    });
}

// ── Config ──
function abrirConfig(){
  renderCfgChips();
  renderSoundOptions();
  document.getElementById('ci-config-screen').style.display = 'block';
}
function cerrarConfig(){
  document.getElementById('ci-config-screen').style.display = 'none';
}

function renderCfgChips(){
  renderChipList('cfg-tipos-chips', ciConfig.tipoInsumoList.map(t=>t.name), cfgDelTipo);
  renderChipList('cfg-obs-chips', ciConfig.obsList, cfgDelObs);
}

function renderChipList(containerId, items, delFn){
  const c = document.getElementById(containerId);
  if(!c) return;
  c.innerHTML = '';
  items.forEach((item, i) => {
    const chip = document.createElement('div');
    chip.className = 'cfg-chip';
    chip.innerHTML = `${item}<button class="cfg-chip-del" onclick='(${delFn.toString()})(${i})'>✕</button>`;
    c.appendChild(chip);
  });
}

function cfgDelTipo(i){ ciConfig.tipoInsumoList.splice(i,1); renderCfgChips(); }
function cfgDelObs(i){ ciConfig.obsList.splice(i,1); renderCfgChips(); }

function cfgAddTipo(){
  const v = document.getElementById('cfg-tipo-input').value.trim();
  if(!v) return;
  ciConfig.tipoInsumoList.push({ name: v, flow: 'qty_talla' });
  document.getElementById('cfg-tipo-input').value = '';
  renderCfgChips();
}
function cfgAddObs(){
  const v = document.getElementById('cfg-obs-input').value.trim();
  if(!v) return;
  ciConfig.obsList.push(v);
  document.getElementById('cfg-obs-input').value = '';
  renderCfgChips();
}

// ── Sonidos de alerta ──
const CI_SOUNDS = [
  { id: 'sirena1',  label: '🚨 Sirena clásica',            desc: 'Sube y baja como sirena de emergencia — 5s' },
  { id: 'sirena2',  label: '🔴 Sirena rápida',             desc: 'Pulsos cortos alternados de sirena — 5s' },
  { id: 'alarma',   label: '⚠️ Alarma industrial',         desc: 'Tono de alarma de fábrica pulsante — 5s' },
  { id: 'klaxon',   label: '📢 Klaxon',                    desc: 'Bocina de alerta repetida — 5s' },
  { id: 'ding3',    label: '🔔 Ding triple',               desc: 'Tres tonos suaves (menos intenso) — 5s' },
  { id: 'none',     label: '🔇 Sin sonido',                desc: 'No reproducir ningún sonido' },
];

let _selectedSound = localStorage.getItem('ci_sound') || 'sirena1';

function renderSoundOptions(){
  const container = document.getElementById('cfg-sound-options');
  if(!container) return;
  container.innerHTML = '';
  CI_SOUNDS.forEach(s => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);background:#fafbfc;cursor:pointer;transition:all .15s;';
    const isSelected = _selectedSound === s.id;
    if(isSelected) row.style.cssText += 'border-color:var(--accent);background:#eff6ff;';
    row.innerHTML = `
      <div style="width:18px;height:18px;border-radius:50%;border:2px solid ${isSelected?'var(--accent)':'var(--border)'};background:${isSelected?'var(--accent)':'#fff'};flex-shrink:0;display:flex;align-items:center;justify-content:center;">
        ${isSelected?'<div style="width:7px;height:7px;border-radius:50%;background:#fff;"></div>':''}
      </div>
      <div style="flex:1;">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px;color:var(--text);">${s.label}</div>
        <div style="font-size:11px;color:var(--muted);">${s.desc}</div>
      </div>
      <button onclick="event.stopPropagation();previewSound('${s.id}')" style="padding:5px 10px;border-radius:6px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;">▶ Probar</button>
    `;
    row.onclick = () => { _selectedSound = s.id; localStorage.setItem('ci_sound',''); renderSoundOptions(); };
    container.appendChild(row);
  });
}

function previewSound(id){ _playSoundById(id); }

function _playSoundById(id){
  if(id === 'none') return;
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const now = ctx.currentTime;
    const dur = 5.0; // todos duran 5 segundos

    if(id === 'sirena1'){
      // Sirena clásica: oscila lentamente entre tono bajo y alto, 5 ciclos en 5s
      const cycles = 5;
      for(let i = 0; i < cycles; i++){
        const t = now + i * (dur / cycles);
        const half = (dur / cycles) / 2;
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sawtooth';
        // Subir de 400Hz a 900Hz en la primera mitad
        o.frequency.setValueAtTime(400, t);
        o.frequency.linearRampToValueAtTime(900, t + half);
        // Bajar de 900Hz a 400Hz en la segunda mitad
        o.frequency.linearRampToValueAtTime(400, t + half * 2);
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.5, t + 0.05);
        g.gain.setValueAtTime(0.5, t + half * 2 - 0.05);
        g.gain.linearRampToValueAtTime(0, t + half * 2);
        o.start(t); o.stop(t + half * 2);
      }
    } else if(id === 'sirena2'){
      // Sirena rápida: pulsos cortos alternando dos frecuencias — 10 pulsos en 5s
      const pulsos = 10;
      const pDur = dur / pulsos;
      for(let i = 0; i < pulsos; i++){
        const t = now + i * pDur;
        const freq = i % 2 === 0 ? 960 : 640;
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'square';
        o.frequency.value = freq;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.45, t + 0.03);
        g.gain.setValueAtTime(0.45, t + pDur - 0.06);
        g.gain.linearRampToValueAtTime(0, t + pDur - 0.01);
        o.start(t); o.stop(t + pDur);
      }
    } else if(id === 'alarma'){
      // Alarma industrial: tono fuerte pulsante con distorsión — 8 pulsos en 5s
      const pulsos = 8;
      const pDur = dur / pulsos;
      for(let i = 0; i < pulsos; i++){
        const t = now + i * pDur;
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(520, t);
        o.frequency.linearRampToValueAtTime(560, t + pDur * 0.6);
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.6, t + 0.02);
        g.gain.setValueAtTime(0.6, t + pDur * 0.65);
        g.gain.linearRampToValueAtTime(0, t + pDur * 0.75);
        o.start(t); o.stop(t + pDur);
      }
    } else if(id === 'klaxon'){
      // Klaxon/bocina: tono grave de bocina repetido — 5 bocinazos en 5s
      const bocinazos = 5;
      const bDur = dur / bocinazos;
      for(let i = 0; i < bocinazos; i++){
        const t = now + i * bDur;
        // Dos osciladores para el efecto bocina
        [280, 350].forEach(freq => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = 'sawtooth';
          o.frequency.value = freq;
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.3, t + 0.04);
          g.gain.setValueAtTime(0.3, t + bDur * 0.7);
          g.gain.linearRampToValueAtTime(0, t + bDur * 0.82);
          o.start(t); o.stop(t + bDur);
        });
      }
    } else if(id === 'ding3'){
      // Ding triple ampliado a 5s: 3 dings bien espaciados
      [{freq:1046,start:0,dur:2.0},{freq:880,start:1.5,dur:2.0},{freq:1318,start:3.0,dur:2.0}]
      .forEach(({freq,start,d})=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='sine';o.frequency.setValueAtTime(freq,now+start);
        g.gain.setValueAtTime(0,now+start);
        g.gain.linearRampToValueAtTime(0.45,now+start+0.015);
        g.gain.exponentialRampToValueAtTime(0.001,now+start+2.0);
        o.start(now+start);o.stop(now+start+2.0);
      });
    }
  } catch(e){ console.warn('Audio no disponible'); }
}

function cfgGuardar(){
  localStorage.setItem('ci_sound', _selectedSound);
  wsSend({
    type:           'ci_config_sync',
    tipoInsumoList: ciConfig.tipoInsumoList,
    elasticoList:   ciConfig.elasticoList,
    moduleList:     ciConfig.moduleList,
    obsList:        ciConfig.obsList
  });
  cerrarConfig();
  showToast('✅ Configuración guardada');
}

// Historial eliminado

// ── Toast ──
let _toastTimer;
function showToast(msg){
  const el = document.getElementById('ci-toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2800);
}

// ── Volver ──
function volverInicio(){
  if(document.referrer && document.referrer !== window.location.href){
    window.history.back();
  } else {
    window.location.href = '/';
  }
}

// ── Cerrar modales con Esc ──
document.addEventListener('keydown', e => {
  if(e.key === 'Escape'){
    cerrarModalDel();
    cerrarConfig();

});
