<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingresos</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Roboto',sans-serif;background:#f4f6f8;margin:0;color:#111;}
header{height:56px;background:#fff;border-bottom:1px solid #d1d5db;display:flex;align-items:center;padding:0 16px;font-weight:700;}
.container{padding:16px;max-width:900px;margin:auto;}

.card{
  background:#fff;
  border:1px solid #d1d5db;
  border-radius:4px;
  padding:12px;
  margin-bottom:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}

.field{
  border:1px solid #d1d5db;
  padding:6px;
  font-size:12px;
}

.label{font-size:9px;color:#6b7280;}
.value{font-weight:600;}
</style>
</head>

<body>

<header>INGRESOS</header>

<div class="container" id="lista"></div>

<script>
function render(data){
  return `
  <div class="card">
    <div class="grid">
      <div class="field"><div class="label">TIPO</div><div class="value">${data.tipo||'-'}</div></div>
      <div class="field"><div class="label">REFERENCIA</div><div class="value">${data.ref||'-'}</div></div>
      <div class="field"><div class="label">OP/OC</div><div class="value">${data.op||'-'}</div></div>
      <div class="field"><div class="label">INSUMO</div><div class="value">${data.insumo||'-'}</div></div>

      <div class="field"><div class="label">CANTIDAD</div><div class="value">${data.cantidad||'-'}</div></div>
      <div class="field"><div class="label">TALLA</div><div class="value">${data.talla||'-'}</div></div>
      <div class="field"><div class="label">HORA INICIO</div><div class="value">${data.inicio||'-'}</div></div>
      <div class="field"><div class="label">HORA FIN</div><div class="value">${data.fin||'-'}</div></div>

      <div class="field"><div class="label">T. ESPERA</div><div class="value" data-start="${data.start}">0.00</div></div>
    </div>
  </div>`;
}

function update(){
  document.querySelectorAll('[data-start]').forEach(el=>{
    let diff=(Date.now()-new Date(el.dataset.start))/60000;
    el.innerText=diff.toFixed(2);
  });
}

setInterval(update,30000);
</script>

</body>
</html>
