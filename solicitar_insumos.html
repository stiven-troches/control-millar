<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Solicitar Insumos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
body{ background:#f1f5f9; font-family:'Nunito',sans-serif; color:#0f172a; min-height:100vh; }
input,select,textarea{ font-size:16px !important; }
:root{
  --accent:#2563eb; --accent2:#1e3a8a; --text:#0f172a;
  --muted:#64748b; --border:#e2e8f0; --surface:#fff;
  --ok:#22c55e; --danger:#ef4444; --warn:#f59e0b;
}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:100;
  background:#fff;border-bottom:1px solid var(--border);
  box-shadow:0 1px 6px rgba(0,0,0,.07);
  padding:0 clamp(12px,2.5vw,24px);min-height:64px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
header::after{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#1e3a8a,#2563eb,#60a5fa);
}
.hd-left{ display:flex;align-items:center;gap:12px; }
.hd-logo{
  width:36px;height:36px;border-radius:50%;background:#fff;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  box-shadow:0 0 0 2px #e2e8f0,0 2px 8px rgba(0,0,0,.08);flex-shrink:0;
}
.hd-logo img{ width:100%;height:100%;object-fit:contain;padding:3px; }
.hd-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(16px,2.5vw,22px);font-weight:800;
  letter-spacing:2px;text-transform:uppercase;color:#0f172a;line-height:1.1;
}
.hd-title span{ color:var(--accent); }
.hd-sub{ font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.3px;margin-top:1px; }
.hd-right{ display:flex;align-items:center;gap:8px; }
.hd-user-badge{
  display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:8px;
  background:#fff;border:1.5px solid var(--border);
  font-family:'Barlow Condensed',sans-serif;font-size:clamp(11px,1.3vw,14px);
  font-weight:700;color:#475569;letter-spacing:1.5px;text-transform:uppercase;
}
.hd-user-dot{
  width:9px;height:9px;border-radius:50%;background:var(--ok);
  box-shadow:0 0 6px rgba(34,197,94,.7);flex-shrink:0;
}
.hd-back-btn{
  padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);
  background:#fff;color:var(--accent2);font-family:'Nunito',sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.hd-back-btn:hover{ background:#f1f5f9;border-color:#93c5fd; }

/* ── TABS ── */
.tabs{
  display:flex;border-bottom:1px solid var(--border);background:#fff;
  padding:0 clamp(12px,2.5vw,24px);gap:0;
}
.tab-btn{
  padding:14px 20px;border:none;background:none;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;color:var(--muted);
  border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:all .2s;
}
.tab-btn.active{ color:var(--accent);border-bottom-color:var(--accent); }
.tab-btn:hover:not(.active){ color:var(--text); }

/* ── MAIN ── */
#si-main{ padding:20px clamp(12px,2.5vw,24px);max-width:700px;margin:0 auto; }

/* ── FORM CARD ── */
.form-card{
  background:#fff;border-radius:14px;border:1.5px solid var(--border);
  padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.form-title{
  font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;
  letter-spacing:2px;text-transform:uppercase;color:var(--accent2);margin-bottom:20px;
}
.field{ margin-bottom:16px; }
.field label{
  display:block;font-size:10px;font-weight:800;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--muted);margin-bottom:6px;
}
.field input,.field select,.field textarea{
  width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-family:'Nunito',sans-serif;font-size:14px;color:var(--text);
  background:#f8fafc;outline:none;transition:border-color .2s;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--accent);
}
.field-row{ display:flex;gap:12px; }
.field-row .field{ flex:1; }
#si-error{
  color:var(--danger);font-size:12px;font-weight:700;
  margin-bottom:12px;display:none;text-align:center;
}
.btn-primary{
  width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff;
  font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;
  letter-spacing:2px;transition:filter .2s;
}
.btn-primary:hover{ filter:brightness(1.1); }

/* ── HISTORIAL ── */
.hist-empty{
  text-align:center;padding:48px 20px;color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:2px;
}
.req-card{
  background:#fff;border-radius:12px;border:1.5px solid var(--border);
  padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04);
  animation:slup .2s ease;
}
.req-card.alert{ border-left:4px solid var(--danger); }
.req-card.cumplido{ border-left:4px solid var(--warn); }
.req-card.done{ border-left:4px solid var(--ok); opacity:.8; }
@keyframes slup{ from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;} }
.req-hdr{ display:flex;align-items:center;gap:10px;margin-bottom:10px; }
.req-tipo{
  font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;
  letter-spacing:1px;color:var(--accent2);flex:1;
}
.req-badge{
  padding:3px 10px;border-radius:20px;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;
}
.req-badge.alert{ background:#fef2f2;color:#b91c1c; }
.req-badge.cumplido{ background:#fffbeb;color:#92400e; }
.req-badge.done{ background:#f0fdf4;color:#15803d; }
.req-fields{ display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px; }
.req-field{
  background:#f8fafc;border-radius:8px;padding:6px 12px;flex:1;min-width:100px;
}
.req-field-lbl{ font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted); }
.req-field-val{
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--text);
}
.req-footer{ font-size:11px;color:var(--muted);font-weight:600; }

/* ── LOADER ── */
#si-loader{
  position:fixed;inset:0;z-index:9999;background:var(--bg,#f1f5f9);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
.si-spin{
  width:32px;height:32px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }

/* ── TOAST ── */
#si-toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#0f172a;color:#fff;padding:12px 24px;border-radius:12px;
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;
  z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.2);display:none;
}
</style>
</head>

<div id="si-toast"></div>

<script>
// ══════════════════════════════════════════════════════
//  solicitar_insumos.html — Vista del mecánico/solicitante
// ══════════════════════════════════════════════════════

const _params     = new URLSearchParams(window.location.search);
const currentUser = _params.get('perfil') || _params.get('user') || 'Mecanicos';

let ws, wsReady=false, reconnectDelay=1000, reconnectTimer=null;
let ciRequests   = [];
let ciConfig     = { tipoInsumoList:[], elasticoList:[], moduleList:[], obsList:[] };
let _currentTab  = 'nueva';

// ── Header ──
document.getElementById('hd-user-lbl').textContent = currentUser.toUpperCase();

// ── WebSocket ──
function wsSend(obj){
  if(ws && ws.readyState===1) ws.send(JSON.stringify(obj));
}

function connectWS(){
  const proto = location.protocol==='https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);

  ws.onopen = () => {
    wsReady=true; reconnectDelay=1000;
    clearTimeout(reconnectTimer);
    wsSend({ type:'ci_init' });
  };

  ws.onmessage = (e) => {
    try{
      const msg = JSON.parse(e.data);
      if(msg.type==='ci_init'){
        ciRequests = msg.requests || [];
        if(msg.tipoInsumoList) ciConfig.tipoInsumoList = msg.tipoInsumoList;
        if(msg.elasticoList)   ciConfig.elasticoList   = msg.elasticoList;
        if(msg.moduleList)     ciConfig.moduleList     = msg.moduleList;
        if(msg.obsList)        ciConfig.obsList        = msg.obsList;
        arrancar();
      } else if(msg.type==='ci_new_request'){
        if(!ciRequests.find(r=>r._id===msg.request._id)) ciRequests.unshift(msg.request);
        if(_currentTab==='hist') renderHistorial();
      } else if(msg.type==='ci_update_request'){
        const idx=ciRequests.findIndex(r=>r._id===msg.request._id);
        if(idx>-1) ciRequests[idx]=msg.request; else ciRequests.unshift(msg.request);
        if(_currentTab==='hist') renderHistorial();
        // Notificar si es una solicitud propia marcada como cumplida
        if(msg.request.module===currentUser && msg.request.status==='cumplido'){
          showToast('📦 ¡Tu insumo está listo! El CI lo marcó como cumplido.');
        }
      } else if(msg.type==='ci_delete_request'){
        if(msg.reqId) ciRequests=ciRequests.filter(r=>r._id!==msg.reqId);
        if(_currentTab==='hist') renderHistorial();
      } else if(msg.type==='ci_cumplido_request'){
        // El CI marcó cumplido — notificar al módulo
        const req=msg.request;
        if(req && req.module===currentUser){
          showToast('📦 ¡Tu insumo está listo para recoger!');
        }
        const idx=ciRequests.findIndex(r=>r._id===req._id);
        if(idx>-1) ciRequests[idx]=req; else ciRequests.unshift(req);
        if(_currentTab==='hist') renderHistorial();
      }
    } catch(err){ console.error('[SI] Error msg:', err); }
  };

  ws.onclose = () => {
    wsReady=false;
    reconnectTimer=setTimeout(()=>{
      reconnectDelay=Math.min(reconnectDelay*1.5,15000);
      connectWS();
    }, reconnectDelay);
  };
}

function arrancar(){
  // Llenar select de tipos de insumo
  const sel=document.getElementById('si-tipo');
  sel.innerHTML='<option value="">— Seleccionar —</option>';
  ciConfig.tipoInsumoList.forEach(t=>{
    const o=document.createElement('option');
    o.value=t.name; o.dataset.flow=t.flow||'qty_only'; o.textContent=t.name;
    sel.appendChild(o);
  });
  document.getElementById('si-loader').style.display='none';
  document.getElementById('si-app').style.display='block';
  renderHistorial();
}

// ── Tabs ──
function setTab(tab){
  _currentTab=tab;
  document.getElementById('panel-nueva').style.display = tab==='nueva' ? 'block' : 'none';
  document.getElementById('panel-hist').style.display  = tab==='hist'  ? 'block' : 'none';
  document.getElementById('tab-nueva').classList.toggle('active', tab==='nueva');
  document.getElementById('tab-hist').classList.toggle('active',  tab==='hist');
  if(tab==='hist') renderHistorial();
}

// ── Tipo de insumo change ──
function siOnTipoChange(){
  // Talla siempre visible
  const tw=document.getElementById('si-talla-wrap');
  if(tw) tw.style.display='block';
}

// ── Enviar solicitud ──
function siEnviar(){
  const categoria = document.getElementById('si-categoria').value;
  const ref   = document.getElementById('si-ref').value.trim();
  const op    = document.getElementById('si-op').value.trim();
  const tipoSel = document.getElementById('si-tipo');
  const tipo  = tipoSel.value.trim();
  const flow  = tipoSel.options[tipoSel.selectedIndex]?.dataset?.flow || '';
  const qty   = document.getElementById('si-qty').value.trim();
  const talla = document.getElementById('si-talla').value.trim();
  const errEl = document.getElementById('si-error');

  if(!ref||!op||!tipo||!qty){
    errEl.textContent='Por favor completa todos los campos requeridos';
    errEl.style.display='block';
    return;
  }
  errEl.style.display='none';

  const now=new Date();
  const newReq={
    _id:        Date.now()+'-'+Math.random().toString(36).slice(2),
    n:          Date.now(),
    module:     currentUser,
    ref, op,
    tipo:       flow==='elastico' ? tipo+' · '+talla : tipo,
    qty, talla,
    fecha:      now.toLocaleDateString('es-CO'),
    hora:       now.toLocaleTimeString('es-CO'),
    datetime:   now.toLocaleDateString('es-CO')+' '+now.toLocaleTimeString('es-CO'),
    categoria,
    status:     'alert',
    waitTime:   null,
    resolvedAt: null,
    obs:        '',
    alertStart: now.getTime()
  };

  wsSend({ type:'ci_new_request', request:newReq });
  ciRequests.unshift(newReq);

  // Limpiar form
  document.getElementById('si-ref').value='';
  document.getElementById('si-op').value='';
  document.getElementById('si-qty').value='';
  document.getElementById('si-talla').value='';
  document.getElementById('si-tipo').value='';

  showToast('✅ Solicitud enviada al CI');
  setTab('hist');
}

// ── Historial ──
function renderHistorial(){
  const list=document.getElementById('hist-list');
  // Filtrar solicitudes del módulo actual
  const mias=ciRequests.filter(r=>r.module===currentUser);
  if(mias.length===0){
    list.innerHTML='<div class="hist-empty">📦<br>No tienes solicitudes aún</div>';
    return;
  }
  list.innerHTML='';
  mias.forEach(r=>{
    const isDone=r.status==='done';
    const isCump=r.status==='cumplido';
    const badgeLabel=isDone?'Entregado ✅':isCump?'Listo — confirmar ⏳':'Pendiente 🔴';
    const card=document.createElement('div');
    card.className=`req-card ${r.status||'alert'}`;
    card.innerHTML=`
      <div class="req-hdr">
        <div class="req-tipo">${r.tipo||'—'}</div>
        <span class="req-badge ${r.status||'alert'}">${badgeLabel}</span>
      </div>
      <div class="req-fields">
        <div class="req-field"><div class="req-field-lbl">Ref.</div><div class="req-field-val">${r.ref||'—'}</div></div>
        <div class="req-field"><div class="req-field-lbl">OP / OC</div><div class="req-field-val">${r.op||'—'}</div></div>
        <div class="req-field"><div class="req-field-lbl">Cantidad</div><div class="req-field-val">${r.qty||'—'}</div></div>
        ${r.talla?`<div class="req-field"><div class="req-field-lbl">Talla</div><div class="req-field-val">${r.talla}</div></div>`:''}
      </div>
      <div class="req-footer">🕐 ${r.datetime||r.hora||'—'}${r.obs?'  📝 '+r.obs:''}</div>
      ${isCump?`<div style="margin-top:12px;">
        <button onclick="confirmarRecibo('${r._id}')" style="width:100%;padding:12px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,#15803d,#22c55e);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;">✅ CONFIRMAR RECIBO</button>
      </div>`:''}
    `;
    list.appendChild(card);
  });
}

function confirmarRecibo(reqId){
  const req=ciRequests.find(r=>r._id===reqId);
  if(!req) return;
  const updated=Object.assign({},req,{
    status:'done',
    resolvedAt:new Date().toLocaleTimeString('es-CO'),
    waitTime:req.alertStart?Date.now()-req.alertStart:0
  });
  const idx=ciRequests.findIndex(r=>r._id===reqId);
  if(idx>-1) ciRequests[idx]=updated;
  wsSend({type:'ci_update_request', request:updated});
  renderHistorial();
  showToast('✅ Insumo confirmado como recibido');
}

// ── Toast ──
let _toastTimer;
function showToast(msg){
  const el=document.getElementById('si-toast');
  el.textContent=msg; el.style.display='block';
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{ el.style.display='none'; }, 2800);
}

// ── Volver ──
function volverInicio(){
  if(document.referrer && document.referrer!==window.location.href) window.history.back();
  else window.location.href='/';
}

// ── Init ──
connectWS();
</script>
